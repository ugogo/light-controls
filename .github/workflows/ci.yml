name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout light-controls
        uses: actions/checkout@v4

      - name: Checkout dx-light dependency
        run: git clone --depth 1 https://github.com/ugogo/dx-light.git ../dx-light
        shell: pwsh

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore LightControls.slnx

      - name: Test
        run: dotnet test tests/LightControls.Tests/LightControls.Tests.csproj --configuration Release --no-restore --filter "Category!=Integration"

      - name: Build desktop app
        run: dotnet build src/LightControls.Desktop/LightControls.Desktop.csproj --configuration Release --no-restore
